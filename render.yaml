services:
  - type: web
    name: developer-landing
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /api/health
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.render
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DJANGO_DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENAI_MODEL
        value: openrouter/free
      - key: OPENAI_TIMEOUT_SECONDS
        value: "30"
      - key: OPENAI_API_KEY
        sync: false
      - key: CONTACT_OWNER_EMAIL
        value: tabletka2404@mail.ru
      - key: EMAIL_HOST
        value: smtp.mail.ru
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: tabletka2404@mail.ru
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DJANGO_DEFAULT_FROM_EMAIL
        value: Developer Landing <tabletka2404@mail.ru>
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: RATE_LIMIT_MAX
        value: "5"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "900"
